# AI review (étape agentique) — déclenchée sur PR.
# Installe Node + Claude Code, analyse le diff (revue + sécurité),
# poste les commentaires inline et BLOQUE la PR sur un finding `critical`.
name: ai-review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: AI review (revue + sécurité)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1
          git diff "origin/$BASE_REF...HEAD" > pr.diff
          {
            echo "Tu es un relecteur de code et de sécurité pour le projet Pulse."
            echo "Analyse le diff de PR ci-dessous. Repère notamment :"
            echo "secrets/tokens en dur, injection SQL (concaténation de chaînes),"
            echo "print()/logs de debug oubliés, tests supprimés pour faire passer la CI."
            echo 'Réponds UNIQUEMENT par un tableau JSON, sans texte ni balises autour, au format :'
            echo '[{"file":"chemin","line":N,"severity":"critical|warning|info","category":"...","message":"..."}]'
            echo "Tableau vide [] si rien à signaler."
            echo "--- DIFF ---"
            cat pr.diff
          } | claude -p --output-format json | jq -r '.result' > result.txt
          python3 - <<'PY'
          import json, re, pathlib
          raw = pathlib.Path("result.txt").read_text()
          m = re.search(r"\[.*\]", raw, re.S)
          data = json.loads(m.group(0)) if m else []
          pathlib.Path("findings.json").write_text(json.dumps(data))
          print(f"{len(data)} finding(s)")
          PY

      - name: poste les commentaires inline
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          [ -s findings.json ] || echo "[]" > findings.json
          [ "$(jq 'length' findings.json)" -eq 0 ] && { echo "Aucun finding."; exit 0; }
          jq -n --slurpfile f findings.json '{
            event: "COMMENT",
            body: "Revue IA Pulse (automatique)",
            comments: ( $f[0] | map({
              path: .file,
              line: .line,
              side: "RIGHT",
              body: ("**" + .severity + "** [" + .category + "] " + .message)
            }) )
          }' > payload.json
          # commentaires inline ; repli sur un commentaire global si une ligne est hors diff
          gh api -X POST "repos/$REPO/pulls/$PR/reviews" --input payload.json \
            || gh pr comment "$PR" --body "$(jq -r 'map("- **\(.severity)** [\(.category)] `\(.file):\(.line)` — \(.message)") | join("\n")' findings.json)"

      - name: gate — bloque sur critical
        run: |
          set -euo pipefail
          [ -s findings.json ] || echo "[]" > findings.json
          CRIT=$(jq '[.[] | select(.severity == "critical")] | length' findings.json)
          echo "findings critical : $CRIT"
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT finding(s) critical — PR bloquée"
            exit 1
          fi
