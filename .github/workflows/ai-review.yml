# AI review (étape agentique) — déclenchée sur PR.
# Installe Node + Claude Code, prêt à lancer la revue IA (revue + sécurité + changelog).
name: ai-review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install Claude Code
        run: npm install -g @anthropic-ai/claude-code
