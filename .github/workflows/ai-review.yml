# AI review (étape agentique) — déclenchée sur PR.
# 1) Packaging : l'agent tourne dans une image Docker reproductible.
# 2) Hygiène du secret : la clé n'entre jamais dans l'image, injectée au runtime.
# 3) Monitoring : log structuré par run -> artifact -> 3 métriques de pilotage.
name: ai-review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: build image (reproductible, SANS secret)
        run: docker build -t pulse-ai-review:ci .

      - name: prépare le diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1
          mkdir -p out
          git diff "origin/$BASE_REF...HEAD" > out/pr.diff

      - name: run agent (clé injectée au RUNTIME)
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          docker run --rm \
            -e ANTHROPIC_API_KEY \
            -e PR_NUMBER="${{ github.event.pull_request.number }}" \
            -e COMMIT_SHA="${{ github.event.pull_request.head.sha }}" \
            -e BASE_REF="${{ github.event.pull_request.base.ref }}" \
            -e OUT_DIR=/work \
            -v "$PWD/out:/work" \
            pulse-ai-review:ci /work/pr.diff
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: poste les commentaires inline
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          [ -s out/findings.json ] || echo "[]" > out/findings.json
          [ "$(jq 'length' out/findings.json)" -eq 0 ] && { echo "Aucun finding."; exit 0; }
          jq -n --slurpfile f out/findings.json '{
            event: "COMMENT",
            body: "Revue IA Pulse (automatique)",
            comments: ( $f[0] | map({
              path: .file, line: .line, side: "RIGHT",
              body: ("**" + .severity + "** [" + .category + "] " + .message)
            }) )
          }' > out/payload.json
          gh api -X POST "repos/$REPO/pulls/$PR/reviews" --input out/payload.json \
            || gh pr comment "$PR" --body "$(jq -r 'map("- **\(.severity)** [\(.category)] `\(.file):\(.line)` — \(.message)") | join("\n")' out/findings.json)"

      - name: monitoring — collecte du log + 3 métriques
        if: always()
        run: |
          set -euo pipefail
          [ -s out/runs.jsonl ] || { echo "Pas de run log."; exit 0; }
          metrics="$(python3 agent/metrics.py out/runs.jsonl)"
          {
            echo "### Métriques de pilotage (run courant)"
            echo '```json'
            echo "$metrics"
            echo '```'
            echo "- **block_rate_pct** : % de runs bloqués (pression sécurité)"
            echo "- **avg_findings** : findings moyens / run (charge de revue)"
            echo "- **avg_duration_s** : latence moyenne du run agent"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload run log (collecte hors-CI)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-runs-${{ github.event.pull_request.head.sha }}
          path: |
            out/runs.jsonl
            out/findings.json

      - name: gate — bloque sur critical
        run: |
          set -euo pipefail
          [ -s out/findings.json ] || echo "[]" > out/findings.json
          CRIT=$(jq '[.[] | select(.severity == "critical")] | length' out/findings.json)
          echo "findings critical : $CRIT"
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT finding(s) critical — PR bloquée"
            exit 1
          fi
